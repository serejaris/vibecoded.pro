<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Open Graph -->
<meta property="og:site_name" content="vibecoded.pro">
<meta property="og:locale" content="ru_RU">
<meta property="og:title" content="{{ if .IsHome }}Курированные ответы для вайбкодеров{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ $ogImage := .Site.Params.ogImage }}
{{ with .Params.image }}{{ $ogImage = (printf "%s%s" $.Site.BaseURL .) }}{{ end }}
{{ with $ogImage }}<meta property="og:image" content="{{ . }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">{{ end }}

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
{{ with $ogImage }}<meta name="twitter:image" content="{{ . }}">{{ end }}
<meta name="twitter:title" content="{{ if .IsHome }}Курированные ответы для вайбкодеров{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- JSON-LD -->
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "vibecoded.pro",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}"
}
</script>
{{ end }}
{{ if and (.IsPage) (eq .Section "q") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "DiscussionForumPosting",
  "headline": "{{ .Title }}",
  "text": "{{ with .Params.short_answer }}{{ . }}{{ end }}",
  "url": "{{ .Permalink }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "author": {
    "@type": "Organization",
    "name": "vibecoded.pro",
    "url": "https://vibecoded.pro/"
  },
  "interactionStatistic": {
    "@type": "InteractionCounter",
    "interactionType": "https://schema.org/CommentAction",
    "userInteractionCount": {{ with .Params.opinions_count }}{{ . }}{{ else }}0{{ end }}
  },
  "keywords": [{{ range $i, $tag := .Params.tags }}{{ if $i }}, {{ end }}"{{ $tag }}"{{ end }}],
  "inLanguage": "ru-RU"
}
</script>
{{ end }}
