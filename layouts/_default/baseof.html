<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}vibecoded.pro — Курированные ответы для вайбкодеров{{ else }}{{ .Title }} | vibecoded.pro{{ end }}</title>
  {{ partial "seo.html" . }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  {{ with .OutputFormats.Get "RSS" }}<link rel="alternate" type="application/rss+xml" title="vibecoded.pro" href="{{ .RelPermalink }}">{{ end }}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Fira Code", "SF Mono", "Fira Mono", "Roboto Mono", monospace;
      background: #0a0a0a;
      color: #999;
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 3rem;
    }

    a { color: #22C55E; text-decoration: none; }
    a:hover { text-decoration: underline; }

    h1, h2, h3 { color: #d4d4d4; font-weight: 600; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.15rem; margin-bottom: 0.5rem; }
    h3 { font-size: 1rem; }

    /* Header */
    .site-header {
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .site-header a {
      color: #d4d4d4;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .site-header a:hover { text-decoration: none; }

    .site-tagline {
      color: #555;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    .site-nav {
      display: flex;
      gap: 1.5rem;
      margin-top: 0.75rem;
    }

    .site-nav a {
      color: #666;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: #22C55E;
    }

    /* Question cards */
    .q-card {
      display: block;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
      color: inherit;
      text-decoration: none;
      background: #0f0f0f;
    }

    .q-card:hover {
      border-color: #22C55E;
      background: #111;
      text-decoration: none;
    }

    .q-card-question {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .q-mark {
      color: #22C55E;
      font-weight: 600;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .q-card-title {
      font-size: 0.95rem;
      color: #d4d4d4;
      font-weight: 600;
    }

    .q-card-answer {
      font-size: 0.82rem;
      color: #777;
      margin-bottom: 0.6rem;
      margin-left: 1.25rem;
      line-height: 1.5;
    }

    .q-card-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.7rem;
      color: #555;
      margin-left: 1.25rem;
    }

    .q-card-meta .sep { color: #333; }

    /* Featured question card */
    .q-featured {
      border-left: 3px solid #22C55E;
      padding: 1.5rem 1.75rem;
      margin-bottom: 1rem;
    }

    .q-featured .q-card-title {
      font-size: 1.05rem;
    }

    /* Tags */
    .tag {
      display: inline-block;
      font-size: 0.68rem;
      color: #22C55E;
      background: rgba(34, 197, 94, 0.08);
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .tag:hover {
      background: rgba(34, 197, 94, 0.18);
      text-decoration: none;
    }

    .tags-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    /* Section labels */
    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #22C55E;
      font-weight: 500;
      margin-bottom: 0.75rem;
      margin-top: 2.5rem;
    }

    .section-label:first-of-type {
      margin-top: 0;
    }

    /* Short answer block */
    .short-answer {
      border-left: 3px solid #22C55E;
      background: rgba(34, 197, 94, 0.04);
      padding: 1rem 1.25rem;
      margin: 1.25rem 0;
      border-radius: 0 6px 6px 0;
    }

    .short-answer .label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #22C55E;
      margin-bottom: 0.5rem;
    }

    .short-answer p {
      color: #bbb;
      font-size: 0.92rem;
      line-height: 1.6;
      margin: 0;
    }

    /* Meta bar */
    .meta-bar {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1a1a1a;
      margin-bottom: 1.5rem;
      font-size: 0.78rem;
      color: #666;
    }

    .meta-bar span {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Content body */
    .content-body {
      margin-top: 1.5rem;
    }

    .content-body p {
      margin-bottom: 1rem;
    }

    .content-body h2 {
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1a1a1a;
    }

    .content-body h3 {
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      color: #bbb;
    }

    .content-body ul, .content-body ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .content-body li {
      margin-bottom: 0.35rem;
    }

    .content-body code {
      background: #1a1a1a;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      font-size: 0.85em;
    }

    .content-body pre {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      padding: 1rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1rem;
    }

    .content-body pre code {
      background: none;
      padding: 0;
    }

    .content-body blockquote {
      border-left: 2px solid #333;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #888;
      font-style: italic;
    }

    /* Opinion blocks */
    .content-body h3 + blockquote {
      border-left-color: #22C55E;
      color: #aaa;
    }

    /* CTA block */
    .cta-block {
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      margin: 2rem 0;
      background: #0f0f0f;
    }

    .cta-block p {
      margin-bottom: 0.5rem;
    }

    .cta-block p:last-child {
      margin-bottom: 0;
    }

    .cta-block strong {
      color: #d4d4d4;
    }

    /* Related questions */
    .related-questions {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #1a1a1a;
    }

    .related-questions h2 {
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }

    .related-questions ul {
      list-style: none;
      padding: 0;
    }

    .related-questions li {
      padding: 0.5rem 0;
      border-bottom: 1px solid #111;
    }

    .related-questions li a {
      font-size: 0.9rem;
    }

    .related-questions li p {
      font-size: 0.78rem;
      color: #666;
      margin-top: 0.2rem;
    }

    /* Links */
    .thread-link {
      font-size: 0.8rem;
      margin-top: 1.5rem;
    }

    .edit-link {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: #555;
    }

    .edit-link:hover {
      color: #22C55E;
    }

    /* Home hero */
    .home-hero {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #1a1a1a;
    }

    .home-hero-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #e0e0e0;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .home-hero-desc {
      color: #666;
      font-size: 0.9rem;
      max-width: 36em;
      line-height: 1.6;
    }

    /* About block */
    .about-block {
      margin-top: 2.5rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      background: #0f0f0f;
      font-size: 0.85rem;
      color: #777;
      line-height: 1.6;
    }

    .about-block strong {
      color: #bbb;
    }

    /* Card grid for list pages */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    /* Footer */
    .site-footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #1a1a1a;
      font-size: 0.72rem;
      color: #444;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .footer-links, .footer-social {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-links a, .footer-social a {
      color: #555;
    }

    .footer-links a:hover, .footer-social a:hover {
      color: #22C55E;
    }

    .sep { color: #333; }

    /* Tablet */
    @media (max-width: 900px) {
      .container { padding: 2rem 1.5rem; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .site-nav { gap: 1rem; }
      h1 { font-size: 1.3rem; }
      .home-hero-title { font-size: 1.3rem; }
      .home-hero { margin-bottom: 2rem; padding-bottom: 1.5rem; }
      .meta-bar { gap: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="/">vibecoded.pro</a>
      <p class="site-tagline">Курированные ответы из сообщества вайбкодеров</p>
      <nav class="site-nav">
        <a href="/q/"{{ if eq .Section "q" }} class="active"{{ end }}>Все вопросы</a>
        <a href="/tags/"{{ if eq .Kind "taxonomy" }} class="active"{{ end }}>Теги</a>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
